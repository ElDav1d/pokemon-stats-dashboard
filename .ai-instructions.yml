# AI Assistant Instructions for pokemon-stats-dashboard

## Testing Style Guidelines

### Test Structure Rules
- **NO describe blocks**: File naming provides sufficient context
- **Flat test structure**: All `it()` statements at top level
- **Descriptive test names**: Use full sentences explaining behavior

### Examples

❌ **DON'T DO THIS:**
```typescript
describe("UserService", () => {
  it("should create user", () => {});
});
```

✅ **DO THIS:**
```typescript
// File: UserService.test.ts
it("should create user with valid data", () => {});
it("should reject invalid email format", () => {});
it("should handle duplicate username error", () => {});
```

### Rationale
- File names provide sufficient context for test grouping
- Describe blocks add unnecessary nesting and noise
- Flat structure is easier to read and navigate
- Forces better test file organization

### When Writing Tests
1. Create well-named test files (e.g., `UserValidation.test.ts`)
2. Write direct `it()` statements with descriptive names
3. Keep one logical concern per test file
4. Use clear, behavior-describing test names
5. If a test file exceeds ~200 lines, consider splitting it into smaller files (e.g., `Home.test.ts`, `Home.SelectPokemoType.test.ts`)

## Code Style Preferences
- Prefer explicit over implicit
- Use TypeScript for type safety
- Follow Clean Architecture principles
- Maintain framework-agnostic core logic
